# DisMineBridge Configuration

# Discord Bot Einstellungen
discord:
  bot-token: "DEIN_BOT_TOKEN_HIER"
  guild-id: "DEINE_SERVER_ID_HIER"

  whitelist-channel: "DEIN_WHITELIST_CHANNEL"

# Datenbank Einstellungen
database:
  use-local: true
  local:
    file: "disminebridge.db"
  extern:
    host: "localhost"
    port: 3306
    database: "disminebridge"
    username: "root"
    password: ""
    use-ssl: false

# Sprach Einstellungen
language:
  default: "de-DE"

whitelist-enabled: true

# Whitelist Einstellungen
whitelist:
  # Zusätzliche Felder im Whitelist-Formular
  additional-fields:
    enabled: true
    fields:
      - name: "reason"
        label: "Warum möchtest du beitreten?"
        required: true
        max-length: 500
      - name: "plans"
        label: "Was möchtest du auf dem Server machen?"
        required: false
        max-length: 300
      - name: "age"
        label: "Wie alt bist du?"
        required: false
        max-length: 3

  # Wartezeit nach Ablehnung (in Tagen)
  cooldown-after-rejection: 7

  # Automatische Whitelist-Entfernung bei Discord-Austritt
  remove-on-discord-leave: true

# Ticket System Einstellungen
tickets:
  # Maximale Anzahl offener Tickets pro Benutzer
  max-open-tickets-per-user: 3

  # Ticket-Kategorien
  categories:
    support:
      enabled: true
      name: "Support"
      emoji: "🆘"
      description: "Benötigst du Hilfe? Erstelle ein Support-Ticket!"
      color: "#00ff00"

    bug-report:
      enabled: true
      name: "Bug Report"
      emoji: "🐛"
      description: "Hast du einen Bug gefunden? Melde ihn hier!"
      color: "#ff0000"

    whitelist:
      enabled: true
      name: "Whitelist"
      emoji: "📝"
      description: "Beantrage hier deinen Whitelist-Zugang!"
      color: "#0099ff"

  # Automatisches Schließen inaktiver Tickets (in Stunden, 0 = deaktiviert)
  auto-close-inactive: 72

  # Logs
  log-messages: true

# Benachrichtigungen
notifications:
  # Benachrichtige Benutzer über Whitelist-Status via DM
  dm-whitelist-updates: true

  # Benachrichtige bei Ticket-Updates
  dm-ticket-updates: true