      confirm-yes: "✅ Ja, schließen"
      confirm-no: "❌ Abbrechen"
      request-sent: "📨 Schließungsanfrage wurde an die Moderatoren gesendet!"
      request-title: "Schließungsanfrage"
      request-description: "{user} möchte dieses Ticket schließen."
      request-approve: "✅ Genehmigen"
      request-deny: "❌ Ablehnen"
      approved: "✅ Ticket wird geschlossen..."
      denied: "❌ Schließungsanfrage wurde abgelehnt!"
      closed: "🔒 Ticket wurde geschlossen!"

    add-user:
      modal-title: "Benutzer hinzufügen"
